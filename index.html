<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>鲜奶屋 - 每日鲜奶送到家</title>
  <style>
    /* ================================================
       🏗️ Design Tokens (Ant Design 5.0 System)
       ================================================ */
    :root {
      /* Colors */
      --color-primary: #1677ff;
      --color-primary-hover: #4096ff;
      --color-primary-active: #0958d9;
      --color-primary-bg: #e6f4ff;
      --color-success: #52c41a;
      --color-warning: #faad14;
      --color-error: #ff4d4f;
      --color-info: #1677ff;

      /* Text */
      --color-text: #1f1f1f;
      --color-text-secondary: #595959;
      --color-text-tertiary: #8c8c8c;
      --color-text-disabled: #bfbfbf;

      /* BG */
      --color-bg: #ffffff;
      --color-bg-page: #f5f5f5;
      --color-bg-container: #ffffff;
      --color-bg-elevated: #ffffff;
      --color-bg-overlay: rgba(0, 0, 0, 0.45);

      /* Border */
      --color-border: #d9d9d9;
      --color-border-secondary: #f0f0f0;

      /* Shadows (3-tier) */
      --shadow-1: 0 1px 2px 0 rgba(0,0,0,0.03),0 1px 6px-1px rgba(0,0,0,0.02),0 2px 4px 0 rgba(0,0,0,0.02);
      --shadow-2: 0 6px 16px 0 rgba(0,0,0,0.08),0 3px 6px-4px rgba(0,0,0,0.12),0 9px 28px 8px rgba(0,0,0,0.05);
      --shadow-3: 0 12px 24px-6px rgba(0,0,0,0.12),0 9px 36px-6px rgba(0,0,0,0.08),0 18px 48px 12px rgba(0,0,0,0.10);

      /* Spacing (8px grid) */
      --space-0: 0px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;

      /* Border Radius */
      --radius-4: 4px;
      --radius-6: 6px;
      --radius-8: 8px;
      --radius-12: 12px;
      --radius-16: 16px;
      --radius-full: 9999px;

      /* Typography */
      --font-size-xs: 10px;
      --font-size-sm: 12px;
      --font-size-base: 14px;
      --font-size-lg: 16px;
      --font-size-xl: 18px;
      --font-size-2xl: 20px;
      --font-size-3xl: 24px;
      --font-size-4xl: 30px;
      --font-weight-normal: 400;
      --font-weight-medium: 500;
      --font-weight-semibold: 600;
      --font-weight-bold: 700;
      --line-height-tight: 1.3;
      --line-height-base: 1.5;
      --line-height-loose: 1.8;

      /* Layout */
      --page-max-width: 430px;
      --header-height: 44px;
      --tabbar-height: 56px;
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ================================================
       🌐 Reset & Base
       ================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      font-size: var(--font-size-base);
      color: var(--color-text);
      background: var(--color-bg-page);
      line-height: var(--line-height-base);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body {
      min-height: 100dvh;
      padding-bottom: calc(var(--tabbar-height) + var(--safe-area-bottom) + 8px);
    }

    img { display: block; max-width: 100%; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    input, textarea { font-family: inherit; }
    a { color: inherit; text-decoration: none; }

    /* ================================================
       📐 Layout
       ================================================ */
    .app-page {
      display: none;
      max-width: var(--page-max-width);
      margin: 0 auto;
      min-height: 100dvh;
      background: var(--color-bg-page);
    }
    .app-page.active { display: block; }

    /* ================================================
       🏠 Header / Navbar
       ================================================ */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--header-height);
      padding: 0 var(--space-4);
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border-secondary);
    }
    .navbar-title {
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text);
    }
    .navbar-action {
      font-size: var(--font-size-base);
      color: var(--color-primary);
      min-height: 44px;
      display: flex;
      align-items: center;
    }

    /* ================================================
       📑 Tab Bar
       ================================================ */
    .tabbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      height: calc(var(--tabbar-height) + var(--safe-area-bottom));
      padding-bottom: var(--safe-area-bottom);
      background: var(--color-bg);
      border-top: 1px solid var(--color-border-secondary);
      max-width: var(--page-max-width);
      margin: 0 auto;
    }
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      height: 100%;
      min-height: 56px;
      color: var(--color-text-tertiary);
      font-size: 10px;
      font-weight: var(--font-weight-medium);
      transition: color 0.2s;
      cursor: pointer;
      padding-top: 8px;
    }
    .tab-item:active { opacity: 0.7; }
    .tab-item.active { color: var(--color-primary); }
    .tab-icon {
      font-size: 22px;
      line-height: 1;
      height: 26px;
      display: flex;
      align-items: center;
    }
    .tab-badge {
      position: absolute;
      top: 4px;
      right: calc(50% - 16px);
      background: var(--color-error);
      color: #fff;
      font-size: 9px;
      font-weight: var(--font-weight-bold);
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      line-height: 1;
    }
    .tab-item { position: relative; }

    /* ================================================
       🏠 Home Page
       ================================================ */
    .home-header {
      background: linear-gradient(135deg, #1677ff 0%, #69b1ff 100%);
      color: #fff;
      padding: var(--space-5) var(--space-4);
      padding-top: calc(var(--space-5) + env(safe-area-inset-top, 0px));
      border-radius: 0 0 16px 16px;
    }
    .home-header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-3);
    }
    .home-logo {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      letter-spacing: -0.5px;
    }
    .home-search-bar {
      background: rgba(255,255,255,0.2);
      border-radius: var(--radius-full);
      padding: var(--space-2) var(--space-4);
      display: flex;
      align-items: center;
      gap: var(--space-2);
      color: rgba(255,255,255,0.8);
      font-size: var(--font-size-sm);
      min-height: 36px;
      cursor: pointer;
    }
    .home-search-bar:active { opacity: 0.8; }

    .home-banner {
      background: rgba(255,255,255,0.15);
      border-radius: var(--radius-8);
      padding: var(--space-4);
      margin: var(--space-3) 0;
      display: flex;
      gap: var(--space-3);
      align-items: center;
    }
    .banner-icon { font-size: 36px; }
    .banner-text { flex: 1; }
    .banner-title { font-size: var(--font-size-lg); font-weight: var(--font-weight-semibold); margin-bottom: 2px; }
    .banner-sub { font-size: var(--font-size-sm); opacity: 0.8; }
    .banner-btn {
      background: #fff;
      color: var(--color-primary);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      min-height: 32px;
      display: flex;
      align-items: center;
    }

    .home-content { padding: var(--space-4); }

    /* Category Pills */
    .filter-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      margin-bottom: var(--space-4);
    }
    .filter-scroll::-webkit-scrollbar { display: none; }
    .filter-chips {
      display: flex;
      gap: var(--space-2);
      min-width: max-content;
    }
    .filter-chip {
      padding: var(--space-1) var(--space-4);
      border-radius: var(--radius-full);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--color-text-secondary);
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      min-height: 32px;
      display: flex;
      align-items: center;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-chip.active {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }
    .filter-chip:active { opacity: 0.8; }

    /* Section Header */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-3);
    }
    .section-title {
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text);
    }
    .section-more {
      font-size: var(--font-size-sm);
      color: var(--color-text-tertiary);
      display: flex;
      align-items: center;
      gap: 2px;
    }

    /* Product Grid */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-3);
    }
    .product-card {
      background: var(--color-bg);
      border-radius: var(--radius-8);
      overflow: hidden;
      box-shadow: var(--shadow-1);
      transition: box-shadow 0.2s;
    }
    .product-card:active { box-shadow: var(--shadow-2); }
    .product-thumb-wrap {
      position: relative;
      padding-top: 100%;
      background: #fafafa;
    }
    .product-thumb {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
    }
    .product-tag {
      position: absolute;
      top: var(--space-2);
      left: var(--space-2);
      background: var(--color-primary);
      color: #fff;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      padding: 1px 6px;
      border-radius: var(--radius-4);
    }
    .product-tag.org { background: #fa8c16; }
    .product-tag.green { background: var(--color-success); }
    .product-info { padding: var(--space-2) var(--space-3) var(--space-3); }
    .product-name {
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-medium);
      color: var(--color-text);
      margin-bottom: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: var(--line-height-tight);
    }
    .product-spec {
      font-size: var(--font-size-xs);
      color: var(--color-text-tertiary);
      margin-bottom: var(--space-2);
    }
    .product-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .product-price {
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-bold);
      color: var(--color-error);
    }
    .product-price small { font-size: var(--font-size-xs); font-weight: var(--font-weight-normal); }
    .product-add-btn {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-full);
      background: var(--color-primary);
      color: #fff;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      box-shadow: 0 2px 4px rgba(22,119,255,0.3);
    }
    .product-add-btn:active { background: var(--color-primary-active); }

    /* Quick Links */
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }
    .quick-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3) 0;
      background: var(--color-bg);
      border-radius: var(--radius-8);
      box-shadow: var(--shadow-1);
      min-height: 88px;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }
    .quick-item:active { box-shadow: var(--shadow-2); }
    .quick-icon { font-size: 28px; }
    .quick-label { font-size: var(--font-size-xs); color: var(--color-text-secondary); font-weight: var(--font-weight-medium); }

    /* Menu List */
    .menu-group { margin-top: var(--space-4); }
    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4);
      background: var(--color-bg);
      border-radius: var(--radius-8);
      margin-bottom: var(--space-2);
      box-shadow: var(--shadow-1);
      cursor: pointer;
      min-height: 56px;
      transition: box-shadow 0.2s;
    }
    .menu-item:active { box-shadow: var(--shadow-2); }
    .menu-item-left { display: flex; align-items: center; gap: var(--space-3); }
    .menu-item-icon { font-size: 20px; width: 36px; height: 36px; border-radius: var(--radius-6); background: var(--color-primary-bg); display: flex; align-items: center; justify-content: center; }
    .menu-item-text { font-size: var(--font-size-base); font-weight: var(--font-weight-medium); color: var(--color-text); }
    .menu-arrow { color: var(--color-text-tertiary); font-size: 18px; }

    /* ================================================
       📂 Category Page
       ================================================ */
    .cat-layout {
      display: flex;
      height: calc(100dvh - var(--header-height) - var(--tabbar-height) - var(--safe-area-bottom));
    }
    .cat-sidebar {
      width: 80px;
      background: var(--color-bg-page);
      overflow-y: auto;
      flex-shrink: 0;
    }
    .cat-sidebar-item {
      padding: var(--space-4) var(--space-2);
      text-align: center;
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      font-weight: var(--font-weight-medium);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.2s;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cat-sidebar-item.active {
      background: var(--color-bg);
      color: var(--color-primary);
      border-left-color: var(--color-primary);
      font-weight: var(--font-weight-semibold);
    }
    .cat-main {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-4);
      background: var(--color-bg);
    }
    .cat-sub-title {
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text);
      margin-bottom: var(--space-4);
    }

    /* ================================================
       🛒 Cart Page
       ================================================ */
    .cart-store {
      background: var(--color-bg);
      border-radius: var(--radius-8);
      margin-bottom: var(--space-3);
      box-shadow: var(--shadow-1);
      overflow: hidden;
    }
    .cart-store-header {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--color-border-secondary);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text);
    }
    .cart-item {
      display: flex;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--color-border-secondary);
      align-items: center;
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-thumb { font-size: 44px; flex-shrink: 0; width: 64px; height: 64px; background: #fafafa; border-radius: var(--radius-6); display: flex; align-items: center; justify-content: center; }
    .cart-info { flex: 1; min-width: 0; }
    .cart-name { font-size: var(--font-size-base); font-weight: var(--font-weight-medium); color: var(--color-text); margin-bottom: 2px; }
    .cart-spec { font-size: var(--font-size-xs); color: var(--color-text-tertiary); margin-bottom: var(--space-2); }
    .cart-bottom { display: flex; justify-content: space-between; align-items: center; }
    .cart-price { font-size: var(--font-size-base); font-weight: var(--font-weight-bold); color: var(--color-error); }
    .cart-qty-control {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      background: var(--color-bg-page);
      border-radius: var(--radius-4);
      padding: 2px;
    }
    .qty-btn {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-4);
      background: var(--color-bg);
      color: var(--color-text);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      box-shadow: var(--shadow-1);
      min-width: 28px;
    }
    .qty-num { min-width: 28px; text-align: center; font-size: var(--font-size-base); font-weight: var(--font-weight-semibold); }
    .cart-footer {
      position: fixed;
      bottom: calc(var(--tabbar-height) + var(--safe-area-bottom));
      left: 0;
      right: 0;
      max-width: var(--page-max-width);
      margin: 0 auto;
      background: var(--color-bg);
      border-top: 1px solid var(--color-border);
      padding: var(--space-3) var(--space-4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      z-index: 50;
      padding-bottom: calc(var(--space-3) + var(--safe-area-bottom));
    }
    .cart-total { flex: 1; }
    .cart-total-label { font-size: var(--font-size-xs); color: var(--color-text-tertiary); }
    .cart-total-price { font-size: var(--font-size-xl); font-weight: var(--font-weight-bold); color: var(--color-error); }
    .cart-checkout-btn {
      background: var(--color-primary);
      color: #fff;
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      padding: 0 var(--space-6);
      border-radius: var(--radius-full);
      min-height: 44px;
      display: flex;
      align-items: center;
      box-shadow: 0 4px 12px rgba(22,119,255,0.3);
      transition: background 0.2s;
    }
    .cart-checkout-btn:active { background: var(--color-primary-active); }
    .cart-select-all {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      min-height: 44px;
      cursor: pointer;
    }
    .cart-check-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .cart-check-icon.checked {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #fff;
    }

    /* ================================================
       📋 Order Confirm Page
       ================================================ */
    .page-content { padding: var(--space-4); }
    .addr-card {
      background: var(--color-bg);
      border-radius: var(--radius-8);
      padding: var(--space-4);
      margin-bottom: var(--space-3);
      display: flex;
      align-items: center;
      gap: var(--space-3);
      box-shadow: var(--shadow-1);
      cursor: pointer;
      min-height: 72px;
    }
    .addr-icon { font-size: 24px; }
    .addr-info { flex: 1; }
    .addr-user { display: flex; gap: var(--space-2); align-items: center; margin-bottom: 2px; }
    .addr-name { font-weight: var(--font-weight-semibold); font-size: var(--font-size-base); }
    .addr-phone { font-size: var(--font-size-sm); color: var(--color-text-secondary); }
    .addr-detail { font-size: var(--font-size-sm); color: var(--color-text-secondary); }
    .addr-arrow { color: var(--color-text-tertiary); font-size: 20px; }
    .addr-tag {
      background: var(--color-primary-bg);
      color: var(--color-primary);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      padding: 1px 6px;
      border-radius: var(--radius-4);
      margin-right: var(--space-2);
    }
    .goods-list {
      background: var(--color-bg);
      border-radius: var(--radius-8);
      margin-bottom: var(--space-3);
      box-shadow: var(--shadow-1);
      overflow: hidden;
    }
    .goods-item {
      display: flex;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--color-border-secondary);
      align-items: center;
    }
    .goods-item:last-child { border-bottom: none; }
    .goods-thumb { font-size: 40px; width: 56px; height: 56px; background: #fafafa; border-radius: var(--radius-6); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .goods-info { flex: 1; min-width: 0; }
    .goods-name { font-weight: var(--font-weight-medium); font-size: var(--font-size-base); margin-bottom: 2px; }
    .goods-spec { font-size: var(--font-size-xs); color: var(--color-text-tertiary); margin-bottom: var(--space-1); }
    .goods-price-row { display: flex; justify-content: space-between; align-items: center; }
    .goods-price { color: var(--color-error); font-weight: var(--font-weight-bold); }
    .goods-qty { color: var(--color-text-secondary); font-size: var(--font-size-sm); }
    .fee-card {
      background: var(--color-bg);
      border-radius: var(--radius-8);
      padding: var(--space-3) var(--space-4);
      margin-bottom: var(--space-3);
      box-shadow: var(--shadow-1);
    }
    .fee-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-2) 0;
      font-size: var(--font-size-base);
    }
    .fee-row.total {
      border-top: 1px solid var(--color-border-secondary);
      margin-top: var(--space-2);
      padding-top: var(--space-3);
      font-weight: var(--font-weight-semibold);
      font-size: var(--font-size-lg);
    }
    .fee-label { color: var(--color-text-secondary); }
    .fee-value { color: var(--color-text); }
    .fee-row.total .fee-value { color: var(--color-error); font-size: var(--font-size-xl); }
    .coupon-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--color-bg);
      border-radius: var(--radius-8);
      padding: var(--space-4);
      margin-bottom: var(--space-3);
      box-shadow: var(--shadow-1);
      cursor: pointer;
      min-height: 52px;
    }
    .coupon-left { display: flex; align-items: center; gap: var(--space-3); }
    .coupon-icon { font-size: 20px; }
    .coupon-label { font-size: var(--font-size-base); font-weight: var(--font-weight-medium); }
    .coupon-right { display: flex; align-items: center; gap: var(--space-2); }
    .coupon-value { font-size: var(--font-size-sm); color: var(--color-error); font-weight: var(--font-weight-semibold); }
    .remark-input {
      background: var(--color-bg);
      border-radius: var(--radius-8);
      padding: var(--space-3) var(--space-4);
      margin-bottom: var(--space-4);
      box-shadow: var(--shadow-1);
    }
    .remark-input input {
      width: 100%;
      border: none;
      outline: none;
      font-size: var(--font-size-base);
      background: transparent;
      color: var(--color-text);
    }
    .remark-input input::placeholder { color: var(--color-text-tertiary); }
    .submit-bar {
      position: fixed;
      bottom: calc(var(--tabbar-height) + var(--safe-area-bottom));
      left: 0;
      right: 0;
      max-width: var(--page-max-width);
      margin: 0 auto;
      background: var(--color-bg);
      border-top: 1px solid var(--color-border);
      padding: var(--space-3) var(--space-4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      z-index: 50;
      padding-bottom: calc(var(--space-3) + var(--safe-area-bottom));
    }
    .submit-price { flex: 1; }
    .submit-price-label { font-size: var(--font-size-xs); color: var(--color-text-tertiary); }
    .submit-price-value { font-size: var(--font-size-2xl); font-weight: var(--font-weight-bold); color: var(--color-error); }
    .submit-btn {
      background: var(--color-primary);
      color: #fff;
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      padding: 0 var(--space-8);
      border-radius: var(--radius-full);
      min-height: 44px;
      display: flex;
      align-items: center;
      box-shadow: 0 4px 12px rgba(22,119,255,0.3);
      transition: background 0.2s;
      cursor: pointer;
    }
    .submit-btn:active { background: var(--color-primary-active); }
    .submit-btn:disabled { background: var(--color-text-disabled); box-shadow: none; cursor: not-allowed; }

    /* ================================================
       📦 Order List Page
       ================================================ */
    .order-tabs {
      display: flex;
      background: var(--color-bg);
      border-radius: var(--radius-8);
      margin: var(--space-4);
      padding: 4px;
      gap: 4px;
      box-shadow: var(--shadow-1);
    }
    .order-tab {
      flex: 1;
      text-align: center;
      padding: var(--space-2) 0;
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--color-text-secondary);
      border-radius: var(--radius-6);
      transition: all 0.2s;
      cursor: pointer;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .order-tab.active {
      background: var(--color-primary);
      color: #fff;
      font-weight: var(--font-weight-semibold);
    }
    .order-list { padding: 0 var(--space-4) var(--space-4); }
    .order-card {
      background: var(--color-bg);
      border-radius: var(--radius-8);
      margin-bottom: var(--space-3);
      box-shadow: var(--shadow-1);
      overflow: hidden;
    }
    .order-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--color-border-secondary);
    }
    .order-no { font-size: var(--font-size-sm); color: var(--color-text-secondary); }
    .    .order-status {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
    }
    .order-status.pending { color: var(--color-warning); }
    .order-status.paid { color: var(--color-primary); }
    .order-status.delivering { color: #fa8c16; }
    .order-status.done { color: var(--color-success); }
    .order-status.cancelled { color: var(--color-text-tertiary); }
    .order-card-items { padding: var(--space-3) var(--space-4); }
    .order-goods-item {
      display: flex;
      gap: var(--space-3);
      padding: var(--space-2) 0;
      align-items: center;
    }
    .order-goods-thumb { font-size: 36px; width: 48px; height: 48px; background: #fafafa; border-radius: var(--radius-6); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .order-goods-info { flex: 1; min-width: 0; }
    .order-goods-name { font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .order-goods-spec { font-size: var(--font-size-xs); color: var(--color-text-tertiary); }
    .order-goods-right { text-align: right; flex-shrink: 0; }
    .order-goods-price { font-weight: var(--font-weight-semibold); font-size: var(--font-size-sm); }
    .order-goods-qty { font-size: var(--font-size-xs); color: var(--color-text-tertiary); }
    .order-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-3) var(--space-4);
      border-top: 1px solid var(--color-border-secondary);
    }
    .order-total { font-size: var(--font-size-sm); color: var(--color-text-secondary); }
    .order-total strong { color: var(--color-error); font-size: var(--font-size-base); font-weight: var(--font-weight-bold); }
    .order-actions { display: flex; gap: var(--space-2); }
    .order-action-btn {
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      min-height: 32px;
      display: flex;
      align-items: center;
      border: 1px solid var(--color-border);
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }
    .order-action-btn:active { opacity: 0.7; }
    .order-action-btn.primary {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }
    .order-action-btn.danger {
      color: var(--color-error);
      border-color: var(--color-error);
    }

    /* ================================================
       📄 Order Detail Page
       ================================================ */
    .detail-status-card {
      background: linear-gradient(135deg, var(--color-primary) 0%, #69b1ff 100%);
      color: #fff;
      padding: var(--space-6) var(--space-4);
      border-radius: 0 0 24px 24px;
      margin-bottom: var(--space-4);
    }
    .detail-status-icon { font-size: 40px; margin-bottom: var(--space-2); }
    .detail-status-title { font-size: var(--font-size-xl); font-weight: var(--font-weight-bold); margin-bottom: 4px; }
    .detail-status-desc { font-size: var(--font-size-sm); opacity: 0.85; }

    /* ================================================
       👤 User Center Page
       ================================================ */
    .user-header {
      background: linear-gradient(135deg, #1677ff 0%, #69b1ff 100%);
      color: #fff;
      padding: var(--space-6) var(--space-4);
      padding-top: calc(var(--space-6) + env(safe-area-inset-top, 0px));
      border-radius: 0 0 24px 24px;
      margin-bottom: var(--space-4);
    }
    .user-info { display: flex; align-items: center; gap: var(--space-4); margin-bottom: var(--space-5); }
    .user-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      border: 2px solid rgba(255,255,255,0.4);
      flex-shrink: 0;
    }
    .user-name { font-size: var(--font-size-xl); font-weight: var(--font-weight-bold); margin-bottom: 2px; }
    .user-phone { font-size: var(--font-size-sm); opacity: 0.8; }
    .user-stats {
      display: flex;
      justify-content: space-around;
      background: rgba(255,255,255,0.15);
      border-radius: var(--radius-8);
      padding: var(--space-4) 0;
    }
    .user-stat { text-align: center; }
    .user-stat-num { font-size: var(--font-size-xl); font-weight: var(--font-weight-bold); margin-bottom: 2px; }
    .user-stat-label { font-size: var(--font-size-xs); opacity: 0.8; }
    .user-stat-divider { width: 1px; background: rgba(255,255,255,0.3); }

    /* ================================================
       📍 Address Page
       ================================================ */
    .addr-list { padding: 0 var(--space-4) var(--space-4); }
    .addr-block {
      background: var(--color-bg);
      border-radius: var(--radius-8);
      margin-bottom: var(--space-3);
      box-shadow: var(--shadow-1);
      overflow: hidden;
    }
    .addr-block-main {
      padding: var(--space-4);
      cursor: pointer;
    }
    .addr-block-main:active { background: var(--color-bg-page); }
    .addr-block-user { display: flex; gap: var(--space-2); align-items: center; margin-bottom: var(--space-1); }
    .addr-block-name { font-weight: var(--font-weight-semibold); font-size: var(--font-size-base); }
    .addr-block-phone { font-size: var(--font-size-sm); color: var(--color-text-secondary); }
    .addr-block-detail { font-size: var(--font-size-sm); color: var(--color-text-secondary); margin-top: var(--space-1); }
    .addr-tag { background: var(--color-primary-bg); color: var(--color-primary); font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold); padding: 1px 6px; border-radius: var(--radius-4); margin-right: var(--space-2); }
    .addr-block-actions {
      display: flex;
      justify-content: space-between;
      border-top: 1px solid var(--color-border-secondary);
      padding: var(--space-2) var(--space-4);
    }
    .addr-action {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      cursor: pointer;
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: var(--space-1);
      transition: opacity 0.2s;
    }
    .addr-action:active { opacity: 0.6; }
    .addr-action.danger { color: var(--color-error); }
    .addr-action.default-action.active { color: var(--color-primary); }
    .addr-add-btn {
      background: var(--color-bg);
      border-radius: var(--radius-8);
      padding: var(--space-5) var(--space-4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      color: var(--color-primary);
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      box-shadow: var(--shadow-1);
      cursor: pointer;
      min-height: 52px;
      border: 2px dashed var(--color-primary);
      border-style: dashed;
    }

    /* ================================================
       🎟️ Coupon Page
       ================================================ */
    .coupon-list { padding: 0 var(--space-4) var(--space-4); }
    .coupon-card {
      display: flex;
      border-radius: var(--radius-8);
      margin-bottom: var(--space-3);
      overflow: hidden;
      box-shadow: var(--shadow-1);
      background: var(--color-bg);
      min-height: 100px;
    }
    .coupon-left {
      background: linear-gradient(135deg, var(--color-primary) 0%, #69b1ff 100%);
      color: #fff;
      width: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: var(--space-3);
    }
    .coupon-amount { font-size: 28px; font-weight: var(--font-weight-bold); }
    .coupon-amount small { font-size: var(--font-size-sm); font-weight: var(--font-weight-normal); }
    .coupon-threshold { font-size: var(--font-size-xs); opacity: 0.85; text-align: center; margin-top: 4px; }
    .coupon-right { flex: 1; padding: var(--space-3) var(--space-4); display: flex; flex-direction: column; justify-content: space-between; }
    .coupon-name { font-weight: var(--font-weight-semibold); font-size: var(--font-size-base); margin-bottom: 4px; }
    .coupon-desc { font-size: var(--font-size-xs); color: var(--color-text-tertiary); margin-bottom: var(--space-2); }
    .coupon-time { font-size: var(--font-size-xs); color: var(--color-text-tertiary); }
    .coupon-status-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      margin-top: 4px;
    }
    .coupon-status-badge.unused { background: var(--color-primary-bg); color: var(--color-primary); }
    .coupon-status-badge.used { background: #f5f5f5; color: var(--color-text-tertiary); }
    .coupon-status-badge.expired { background: #f5f5f5; color: var(--color-text-tertiary); }

    /* ================================================
       🔍 Search Page
       ================================================ */
    .search-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border-secondary);
    }
    .search-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--color-bg-page);
      border-radius: var(--radius-full);
      padding: 0 var(--space-3);
      min-height: 36px;
      gap: var(--space-2);
    }
    .search-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: var(--font-size-base);
      color: var(--color-text);
      padding: var(--space-2) 0;
    }
    .search-input::placeholder { color: var(--color-text-tertiary); }
    .search-cancel { color: var(--color-text-secondary); font-size: var(--font-size-base); cursor: pointer; min-height: 44px; display: flex; align-items: center; }
    .search-hot { padding: var(--space-4); }
    .hot-title { font-size: var(--font-size-base); font-weight: var(--font-weight-semibold); color: var(--color-text); margin-bottom: var(--space-3); }
    .hot-tags { display: flex; flex-wrap: wrap; gap: var(--space-2); }
    .hot-tag {
      background: var(--color-bg);
      color: var(--color-text-secondary);
      font-size: var(--font-size-sm);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-full);
      box-shadow: var(--shadow-1);
      cursor: pointer;
      min-height: 32px;
      display: flex;
      align-items: center;
      border: 1px solid var(--color-border-secondary);
      transition: all 0.2s;
    }
    .hot-tag:active { background: var(--color-primary-bg); color: var(--color-primary); }
    .search-result {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-3);
      padding: var(--space-4);
    }

    /* ================================================
       ⭐ Review Page
       ================================================ */
    .review-product {
      display: flex;
      gap: var(--space-3);
      background: var(--color-bg);
      border-radius: var(--radius-8);
      padding: var(--space-4);
      margin-bottom: var(--space-4);
      box-shadow: var(--shadow-1);
      align-items: center;
    }
    .review-product-thumb { font-size: 48px; width: 64px; height: 64px; background: #fafafa; border-radius: var(--radius-8); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .review-product-info { flex: 1; }
    .review-product-name { font-weight: var(--font-weight-semibold); font-size: var(--font-size-base); margin-bottom: 2px; }
    .review-product-spec { font-size: var(--font-size-sm); color: var(--color-text-secondary); }
    .review-form {
      background: var(--color-bg);
      border-radius: var(--radius-8);
      padding: var(--space-4);
      margin-bottom: var(--space-4);
      box-shadow: var(--shadow-1);
    }
    .review-stars { display: flex; gap: var(--space-2); justify-content: center; margin-bottom: var(--space-3); }
    .star {
      font-size: 32px;
      color: var(--color-border);
      cursor: pointer;
      transition: color 0.2s, transform 0.15s;
      display: inline-block;
    }
    .star:active { transform: scale(1.2); }
    .star.active { color: #faad14; }
    .rating-hint { text-align: center; font-size: var(--font-size-sm); color: var(--color-text-secondary); margin-bottom: var(--space-4); }
    .review-textarea { width: 100%; min-height: 120px; border: 1px solid var(--color-border); border-radius: var(--radius-8); padding: var(--space-3); font-size: var(--font-size-base); resize: none; outline: none; background: var(--color-bg-page); color: var(--color-text); line-height: var(--line-height-base); transition: border-color 0.2s; }
    .review-textarea:focus { border-color: var(--color-primary); }
    .review-textarea::placeholder { color: var(--color-text-tertiary); }
    .review-word-count { text-align: right; font-size: var(--font-size-xs); color: var(--color-text-tertiary); margin-top: var(--space-2); }

    /* ================================================
       🎛️ Modal / Popup
       ================================================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: var(--color-bg-overlay);
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-sheet {
      background: var(--color-bg);
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: var(--page-max-width);
      max-height: 90dvh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--color-border);
      border-radius: 2px;
      margin: var(--space-3) auto var(--space-2);
    }
    .modal-title {
      text-align: center;
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-semibold);
      padding: 0 var(--space-4) var(--space-4);
      border-bottom: 1px solid var(--color-border-secondary);
    }
    .modal-body { padding: var(--space-4); }
    .modal-close {
      position: absolute;
      right: var(--space-4);
      top: var(--space-4);
      font-size: 20px;
      color: var(--color-text-tertiary);
      cursor: pointer;
      min-height: 44px;
      display: flex;
      align-items: center;
    }
    .modal-actions {
      display: flex;
      gap: var(--space-3);
      padding: var(--space-4);
      padding-bottom: calc(var(--space-4) + var(--safe-area-bottom));
    }
    .modal-btn {
      flex: 1;
      min-height: 44px;
      border-radius: var(--radius-full);
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-btn.cancel { background: var(--color-bg-page); color: var(--color-text-secondary); border: 1px solid var(--color-border); }
    .modal-btn.confirm { background: var(--color-primary); color: #fff; box-shadow: 0 4px 12px rgba(22,119,255,0.3); }
    .modal-btn:active { opacity: 0.8; }

    /* Form fields */
    .form-field { margin-bottom: var(--space-4); }
    .form-label { font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); color: var(--color-text-secondary); margin-bottom: var(--space-2); display: block; }
    .form-input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-8);
      padding: 0 var(--space-3);
      font-size: var(--font-size-base);
      outline: none;
      background: var(--color-bg);
      color: var(--color-text);
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--color-primary); }

    /* ================================================
       🔔 Toast
       ================================================ */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
      background: rgba(31, 31, 31, 0.88);
      color: #fff;
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      padding: var(--space-3) var(--space-6);
      border-radius: var(--radius-full);
      white-space: nowrap;
      pointer-events: none;
      animation: toastIn 0.3s ease;
      backdrop-filter: blur(8px);
      max-width: 280px;
      text-align: center;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    /* ================================================
       ⬜ Empty State
       ================================================ */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-12) var(--space-4);
      text-align: center;
    }
    .empty-icon { font-size: 64px; margin-bottom: var(--space-4); opacity: 0.5; }
    .empty-text { font-size: var(--font-size-base); color: var(--color-text-tertiary); margin-bottom: var(--space-6); }
    .empty-btn {
      background: var(--color-primary);
      color: #fff;
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      padding: var(--space-3) var(--space-8);
      border-radius: var(--radius-full);
      box-shadow: 0 4px 12px rgba(22,119,255,0.3);
      cursor: pointer;
      min-height: 44px;
      display: flex;
      align-items: center;
    }
    .empty-btn:active { background: var(--color-primary-active); }

    /* ================================================
       🔲 Checkbox
       ================================================ */
    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      cursor: pointer;
      min-height: 44px;
    }
    .checkbox {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;

      transition: all 0.2s;
      flex-shrink: 0;
    }
    .checkbox.checked { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }

    /* ================================================
       📜 Scrollable
       ================================================ */
    .scrollable { overflow-y: auto; -webkit-overflow-scrolling: touch; }
</style>

<script>
(function() {
'use strict';

// ====== Data Layer ======
var CATEGORIES = [
  { id: 'all', name: '全部' },
  { id: 'fresh', name: '鲜奶' },
  { id: 'yogurt', name: '酸奶' },
  { id: 'milk', name: '纯牛奶' },
  { id: 'cheese', name: '奶酪' }
];

var PRODUCTS = [
  { id: '1', name: '每日鲜语鲜牛奶', spec: '1L/瓶', price: 19.90, emoji: '🥛', cat: 'fresh', tag: '热卖', tagClass: '' },
  { id: '2', name: '伊利金典纯牛奶', spec: '250ml*16盒', price: 49.90, emoji: '🥛', cat: 'milk', tag: '有机', tagClass: 'green' },
  { id: '3', name: '安慕希希腊酸奶', spec: '205g*12杯', price: 65.00, emoji: '🍶', cat: 'yogurt', tag: '新品', tagClass: 'org' },
  { id: '4', name: '光明如实酸奶', spec: '135g*4杯', price: 22.80, emoji: '🍶', cat: 'yogurt', tag: '', tagClass: '' },
  { id: '5', name: '蒙牛特仑苏有机奶', spec: '250ml*12盒', price: 58.00, emoji: '🥛', cat: 'milk', tag: '有机', tagClass: 'green' },
  { id: '6', name: '卡士原味酸奶', spec: '1kg/瓶', price: 29.80, emoji: '🍶', cat: 'yogurt', tag: '热卖', tagClass: '' },
  { id: '7', name: '百吉福棒棒奶酪', spec: '20g*20支', price: 35.00, emoji: '🧀', cat: 'cheese', tag: '儿童', tagClass: 'org' },
  { id: '8', name: '三元极致鲜牛奶', spec: '900ml/瓶', price: 28.50, emoji: '🥛', cat: 'fresh', tag: '', tagClass: '' },
  { id: '9', name: '莫斯利安常温酸奶', spec: '200g*10盒', price: 52.00, emoji: '🍶', cat: 'yogurt', tag: '促销', tagClass: 'org' },
  { id: '10', name: '妙可蓝多奶酪棒', spec: '100g*3袋', price: 45.00, emoji: '🧀', cat: 'cheese', tag: '', tagClass: '' }
];

var STATUS_MAP = [
  { key: 'all', name: '全部' },
  { key: 'pending', name: '待付款' },
  { key: 'paid', name: '待发货' },
  { key: 'delivering', name: '配送中' },
  { key: 'done', name: '已完成' }
];

var QUICK_LINKS = [
  { icon: '🥛', label: '鲜奶', cat: 'fresh' },
  { icon: '🍶', label: '酸奶', cat: 'yogurt' },
  { icon: '🥛', label: '纯牛奶', cat: 'milk' },
  { icon: '🧀', label: '奶酪', cat: 'cheese' }
];

// ====== State ======
var currentCat = 'all';
var currentOrderStatus = 'all';
var currentPage = 'home';
var cart = [];
var orders = [];
var addresses = [];
var coupons = [];
var currentRating = 5;
var selectedAddr = null;
var usedCoupon = null;
var cartEditMode = false;
var pageStack = [];
var detailOrderId = null;
var reviewItem = null;

// ====== Utils ======
function $(id) { return document.getElementById(id); }

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function fmt(n) { return '¥' + (typeof n === 'number' ? n.toFixed(2) : parseFloat(n).toFixed(2)); }

function fmtPhone(p) { return p ? p.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2') : ''; }

function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

function load(key) {
  try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch(e) { return null; }
}

function toast(msg) {
  var el = $('toast');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 2200);
}

// ====== TabBar ======
function updateTabBar(page) {
  var tabs = document.querySelectorAll('.tab-item');
  tabs.forEach(function(t) { t.classList.remove('active'); });
  var map = { home: 0, category: 1, cart: 2, 'order-list': 3, user: 4 };
  if (map[page] !== undefined) tabs[map[page]].classList.add('active');
}

// ====== Page Navigation ======
function goPage(page) {
  if (page === currentPage && pageStack.length === 0) return;
  var pages = document.querySelectorAll('.app-page');
  pages.forEach(function(p) { p.classList.remove('active'); });
  $('page-' + page).classList.add('active');
  if (page !== currentPage) pageStack.push(currentPage);
  currentPage = page;
  updateTabBar(page);
  onPageShow(page);
}

function goBack() {
  if (pageStack.length === 0) { goPage('home'); return; }
  var prev = pageStack.pop();
  var pages = document.querySelectorAll('.app-page');
  pages.forEach(function(p) { p.classList.remove('active'); });
  $('page-' + prev).classList.add('active');
  currentPage = prev;
  updateTabBar(prev);
}

function onPageShow(page) {
  switch (page) {
    case 'home': renderHome(); break;
    case 'category': renderCategory(); break;
    case 'cart': renderCart(); break;
    case 'order-confirm': renderOrderConfirm(); break;
    case 'order-list': renderOrderList(); break;
    case 'order-detail': renderOrderDetail(); break;
    case 'user': renderUser(); updateUserStats(); break;
    case 'address': renderAddress(); break;
    case 'coupon': renderCoupon(); break;
    case 'search': renderSearch(); break;
    case 'review': renderReview(); break;
  }
}

// ====== Home Page ======
function renderHome() {
  // Quick links
  $('quick-grid').innerHTML = QUICK_LINKS.map(function(q) {
    return '<div class="quick-item" onclick="goPage(\'category\'); setCat(\'' + q.cat + '\')">' +
      '<div class="quick-icon">' + q.icon + '</div><div class="quick-label">' + q.label + '</div></div>';
  }).join('');

  // Filter chips
  $('filter-bar').innerHTML = CATEGORIES.map(function(c) {
    var active = c.id === currentCat ? ' active' : '';
    return '<button class="filter-chip' + active + '" onclick="setCat(\'' + c.id + '\')">' + c.name + '</button>';
  }).join('');

  // Products
  renderProductGrid();
}

function setCat(cat) {
  currentCat = cat;
  renderHome();
}

function getFilteredProducts(cat) {
  if (cat === 'all') return PRODUCTS;
  return PRODUCTS.filter(function(p) { return p.cat === cat; });
}

function renderProductGrid() {
  var ps = getFilteredProducts(currentCat);
  $('product-grid').innerHTML = ps.map(function(p) { return productCard(p); }).join('');
}

function productCard(p) {
  var tagHtml = p.tag
    ? '<span class="product-tag' + (p.tagClass ? ' ' + p.tagClass : '') + '">' + p.tag + '</span>'
    : '';
  return '<div class="product-card" onclick="goProduct(\'' + p.id + '\')">' +
    '<div class="product-thumb-wrap">' + tagHtml +
    '<div class="product-thumb">' + p.emoji + '</div></div>' +
    '<div class="product-info">' +
    '<div class="product-name">' + p.name + '</div>' +
    '<div class="product-spec">' + p.spec + '</div>' +
    '<div class="product-bottom">' +
    '<div class="product-price"><small>¥</small>' + p.price.toFixed(2) + '</div>' +
    '<div class="product-add-btn" onclick="event.stopPropagation(); addToCart(\'' + p.id + '\')">+</div>' +
    '</div></div></div>';
}

function goProduct(id) {
  var p = PRODUCTS.find(function(x) { return x.id === id; });
  if (!p) return;
  addToCart(id);
}

// ====== Category Page ======
function renderCategory() {
  $('cat-sidebar').innerHTML = CATEGORIES.map(function(c) {
    var active = c.id === currentCat ? ' active' : '';
    return '<div class="cat-sidebar-item' + active + '" onclick="setCat2(\'' + c.id + '\')">' + c.name + '</div>';
  }).join('');

  var ps = getFilteredProducts(currentCat);
  var catName = CATEGORIES.find(function(c) { return c.id === currentCat; });
  $('cat-main').innerHTML = '<div class="cat-sub-title">' + (catName ? catName.name : '') + '</div>' +
    '<div class="product-grid">' + ps.map(function(p) { return productCard(p); }).join('') + '</div>';
}

function setCat2(cat) {
  currentCat = cat;
  renderCategory();
}

// ====== Cart ======
function addToCart(id) {
  var p = PRODUCTS.find(function(x) { return x.id === id; });
  if (!p) return;
  var existing = cart.find(function(x) { return x.id === id; });
  if (existing) {
    existing.quantity += 1;
  } else {
    cart.push({ id: p.id, name: p.name, spec: p.spec, price: p.price, emoji: p.emoji, quantity: 1 });
  }
  save('milk_cart', cart);
  updateCartBadge();
  toast('已添加到购物车 🛒');
}

function updateCartBadge() {
  var total = cart.reduce(function(s, i) { return s + i.quantity; }, 0);
  var badge = $('cart-badge');
  if (total > 0) {
    badge.style.display = 'flex';
    badge.textContent = total > 99 ? '99+' : total;
  } else {
    badge.style.display = 'none';
  }
}

function renderCart() {
  if (!cart.length) {
    $('cart-content').innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-text">购物车是空的</div><div class="empty-btn" onclick="goPage(\'home\')">去逛逛</div></div>';
    $('cart-footer').style.display = 'none';
    return;
  }
  $('cart-footer').style.display = 'flex';
  var allChecked = cart.every(function(i) { return i.checked; });
  var totalAmt = cart.filter(function(i) { return i.checked; }).reduce(function(s, i) { return s + i.price * i.quantity; }, 0);

  var goodsHtml = cart.map(function(item) {
    var checked = item.checked ? ' checked' : '';
    return '<div class="cart-item">' +
      '<div class="checkbox-wrap" onclick="toggleCartItem(\'' + item.id + '\')">' +
      '<div class="cart-check-icon' + checked + '">' + (item.checked ? '✓' : '') + '</div></div>' +
      '<div class="cart-thumb">' + item.emoji + '</div>' +
      '<div class="cart-info">' +
      '<div class="cart-name">' + item.name + '</div>' +
      '<div class="cart-spec">' + item.spec + '</div>' +
      '<div class="cart-bottom">' +
      '<div class="cart-price">' + fmt(item.price) + '</div>' +
      '<div class="cart-qty-control">' +
      '<div class="qty-btn" onclick="event.stopPropagation(); changeQty(\'' + item.id + '\', -1)">−</div>' +
      '<div class="qty-num">' + item.quantity + '</div>' +
      '<div class="qty-btn" onclick="event.stopPropagation(); changeQty(\'' + item.id + '\', 1)">+</div>' +
      '</div></div></div></div>';
  }).join('');

  $('cart-content').innerHTML = '<div class="cart-store">' +
    '<div class="cart-store-header">🏪 鲜奶屋商城</div>' + goodsHtml + '</div>';

  var submitDisabled = !cart.some(function(i) { return i.checked; }) ? 'disabled' : '';
  $('cart-footer').innerHTML = '<label class="cart-select-all" onclick="toggleSelectAll()">' +
    '<div class="cart-check-icon' + (allChecked ? ' checked' : '') + '">' + (allChecked ? '✓' : '') + '</div>' +
    '<span>全选</span></label>' +
    '<div class="cart-total"><div class="cart-total-label">合计</div>' +
    '<div class="cart-total-price">' + fmt(totalAmt) + '</div></div>' +
    '<div class="cart-checkout-btn" onclick="goOrderConfirm()" ' + submitDisabled + '>去结算</div>';
}

function toggleCartItem(id) {
  var item = cart.find(function(x) { return x.id === id; });
  if (item) { item.checked = !item.checked; save('milk_cart', cart); renderCart(); }
}

function toggleSelectAll() {
  var allChecked = cart.every(function(i) { return i.checked; });
  cart.forEach(function(i) { i.checked = !allChecked; });
  save('milk_cart', cart);
  renderCart();
}

function changeQty(id, delta) {
  var item = cart.find(function(x) { return x.id === id; });
  if (!item) return;
  item.quantity += delta;
  if (item.quantity <= 0) {
    cart = cart.filter(function(x) { return x.id !== id; });
  }
  save('milk_cart', cart);
  updateCartBadge();
  renderCart();
}

function toggleCartEdit() {
  cartEditMode = !cartEditMode;
  $('cart-edit-btn').textContent = cartEditMode ? '完成' : '编辑';
}

// ====== Order Confirm ======
function goOrderConfirm() {
  var sel = cart.filter(function(i) { return i.checked; });
  if (!sel.length) { toast('请选择商品'); return; }
  if (!selectedAddr) {
    selectedAddr = addresses.find(function(a) { return a.isDefault; }) || addresses[0] || { name: '请添加收货地址', phone: '', detail: '点击添加' };
  }
  goPage('order-confirm');
}

function renderOrderConfirm() {
  var selItems = cart.filter(function(i) { return i.checked; });
  if (!selItems.length) { goPage('cart'); return; }
  var addrHtml = selectedAddr
    ? '<div class="addr-icon">📍</div><div class="addr-info"><div class="addr-user">' +
      '<span class="addr-name">' + selectedAddr.name + '</span>' +
      '<span class="addr-phone">' + fmtPhone(selectedAddr.phone) + '</span>' +
      (selectedAddr.isDefault ? '<span class="addr-tag">默认</span>' : '') + '</div>' +
      '<div class="addr-detail">' + selectedAddr.detail + '</div></div><div class="addr-arrow">›</div>'
    : '<div class="addr-icon">📍</div><div class="addr-info"><div class="addr-detail">点击添加收货地址</div></div><div class="addr-arrow">›</div>';

  var goodsHtml = selItems.map(function(i) {
    return '<div class="goods-item"><div class="goods-thumb">' + i.emoji + '</div>' +
      '<div class="goods-info"><div class="goods-name">' + i.name + '</div>' +
      '<div class="goods-spec">' + i.spec + '</div></div>' +
      '<div class="goods-price-row"><div class="goods-price">' + fmt(i.price) + '</div>' +
      '<div class="goods-qty">x' + i.quantity + '</div></div></div>';
  }).join('');

  var goodsAmt = selItems.reduce(function(s, i) { return s + i.price * i.quantity; }, 0);
  var fee = 0;
  var discount = usedCoupon ? usedCoupon.value : 0;
  var total = Math.max(0, goodsAmt + fee - discount);

  $('confirm-content').innerHTML =
    '<div class="addr-card" onclick="goPage(\'address\'); setTimeout(function(){goOrderConfirm()},100)">' + addrHtml + '</div>' +
    '<div class="goods-list"><div class="section-header" style="padding:var(--space-3) var(--space-4) 0;">商品清单</div>' + goodsHtml + '</div>' +
    '<div class="coupon-row" onclick="showCouponPicker()">' +
    '<div class="coupon-left"><div class="coupon-icon">🎟️</div><div class="coupon-label">优惠券</div></div>' +
    '<div class="coupon-right">' +
    (usedCoupon ? '<div class="coupon-value">-' + fmt(usedCoupon.value) + '</div>' : '<div style="color:var(--color-text-tertiary);font-size:var(--font-size-sm)">未使用</div>') +
    '<div style="color:var(--color-text-tertiary);font-size:18px;margin-left:4px">›</div></div></div>' +
    '<div class="remark-input"><input id="remark-input" placeholder="备注信息（选填）"></div>' +
    '<div class="fee-card"><div class="fee-row"><span class="fee-label">商品金额</span><span class="fee-value">' + fmt(goodsAmt) + '</span></div>' +
    '<div class="fee-row"><span class="fee-label">配送费</span><span class="fee-value">' + fmt(fee) + '</span></div>' +
    (usedCoupon ? '<div class="fee-row"><span class="fee-label">优惠券</span><span class="fee-value" style="color:var(--color-error)">-' + fmt(discount) + '</span></div>' : '') +
    '<div class="fee-row total"><span class="fee-label">合计</span><span class="fee-value">' + fmt(total) + '</span></div></div>';

  $('submit-total-price').textContent = fmt(total);
}

function showCouponPicker() {
  var available = coupons.filter(function(c) { return !c.used; });
  if (!available.length) { toast('暂无可用优惠券'); return; }
  var body = available.map(function(c) {
    return '<div class="coupon-card" style="margin-bottom:12px" onclick="selectCoupon(\'' + c.id + '\')">' +
      '<div class="coupon-left"><div class="coupon-amount">' + c.value + '<small>元</small></div><div class="coupon-threshold">满' + c.threshold + '可用</div></div>' +
      '<div class="coupon-right"><div class="coupon-name">' + c.name + '</div><div class="coupon-desc">' + c.desc + '</div><div class="coupon-status-badge unused">点击使用</div></div></div>';
  }).join('');
  showModal('选择优惠券', body, [
    { label: '不使用优惠券', action: function() { usedCoupon = null; closeModal(); goOrderConfirm(); }, primary: false },
    { label: '取消', action: function() { closeModal(); }, primary: false }
  ]);
}

function selectCoupon(id) {
  usedCoupon = coupons.find(function(c) { return c.id === id; }) || null;
  closeModal();
  goOrderConfirm();
}

function submitOrder() {
  var selItems = cart.filter(function(i) { return i.checked; });
  if (!selItems.length) { toast('请选择商品'); return; }
  if (!selectedAddr) { toast('请选择收货地址'); goPage('address'); return; }

  var goodsAmt = selItems.reduce(function(s, i) { return s + i.price * i.quantity; }, 0);
  var fee = 0;
  var discount = usedCoupon ? usedCoupon.value : 0;
  var total = Math.max(0, goodsAmt + fee - discount);

  var order = {
    id: genId(),
    orderNo: 'MD' + new Date().getFullYear() + String(new Date().getMonth() + 1).padStart(2, '0') + String(new Date().getDate()).padStart(2, '0') + String(Math.floor(Math.random() * 9000 + 1000)),
    status: 'pending',
    items: selItems.map(function(i) { return { id: i.id, name: i.name, spec: i.spec, price: i.price, emoji: i.emoji, quantity: i.quantity }; }),
    totalAmount: total,
    deliveryFee: fee,
    discount: discount,
    address: selectedAddr,
    createdAt: new Date().toISOString(),
    remark: $('remark-input') ? $('remark-input').value : ''
  };

  orders.unshift(order);
  save('milk_orders', orders);

  // Remove from cart
  cart = cart.filter(function(i) { return !i.checked; });
  save('milk_cart', cart);
  updateCartBadge();

  if (usedCoupon) {
    var c = coupons.find(function(x) { return x.id === usedCoupon.id; });
    if (c) c.used = true;
    save('milk_coupons', coupons);
  }
  usedCoupon = null;

  toast('订单提交成功！');
  setTimeout(function() { detailOrderId = order.id; goPage('order-detail'); }, 1200);
}

// ====== Order List ======
function renderOrderList() {
  $('order-tabs').innerHTML = STATUS_MAP.map(function(s) {
    var active = s.key === currentOrderStatus ? ' active' : '';
    return '<div class="order-tab' + active + '" onclick="setOrderStatus(\'' + s.key + '\')">' + s.name + '</div>';
  }).join('');

  var filtered = currentOrderStatus === 'all'
    ? orders
    : orders.filter(function(o) { return o.status === currentOrderStatus; });

  if (!filtered.length) {
    $('order-list-content').innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">暂无相关订单</div><div class="empty-btn" onclick="goPage(\'home\')">去逛逛</div></div>';
    return;
  }

  $('order-list-content').innerHTML = filtered.map(function(o) { return orderCard(o); }).join('');
}

function setOrderStatus(key) {
  currentOrderStatus = key;
  renderOrderList();
}

function orderCard(o) {
  var statusClass = o.status;
  var statusText = { pending: '待付款', paid: '待发货', delivering: '配送中', done: '已完成', cancelled: '已取消' };
  var statusName = statusText[o.status] || o.status;
  var canPay = o.status === 'pending';
  var canCancel = o.status === 'pending';
  var canReceive = o.status === 'delivering';
  var canReview = o.status === 'done';
  var canDelete = o.status === 'done' || o.status === 'cancelled';

  var goodsHtml = o.items.slice(0, 3).map(function(i) {
    return '<div class="order-goods-item"><div class="order-goods-thumb">' + i.emoji + '</div>' +
      '<div class="order-goods-info"><div class="order-goods-name">' + i.name + '</div><div class="order-goods-spec">' + i.spec + '</div></div>' +
      '<div class="order-goods-right"><div class="order-goods-price">' + fmt(i.price) + '</div><div class="order-goods-qty">x' + i.quantity + '</div></div></div>';
  }).join('');

  var actions = '';
  if (canPay) actions += '<div class="order-action-btn primary" onclick="payOrder(\'' + o.id + '\')">去付款</div>';
  if (canCancel) actions += '<div class="order-action-btn danger" onclick="cancelOrder(\'' + o.id + '\')">取消</div>';
  if (canReceive) actions += '<div class="order-action-btn primary" onclick="receiveOrder(\'' + o.id + '\')">确认收货</div>';
  if (canReview) actions += '<div class="order-action-btn" onclick="goReview(\'' + o.id + '\')">评价</div>';
  if (canDelete) actions += '<div class="order-action-btn danger" onclick="deleteOrder(\'' + o.id + '\')">删除</div>';

  return '<div class="order-card">' +
    '<div class="order-card-header"><div class="order-no">订单号: ' + o.orderNo + '</div><div class="order-status ' + statusClass + '">' + statusName + '</div></div>' +
    '<div class="order-card-items">' + goodsHtml + '</div>' +
    '<div class="order-card-footer"><div class="order-total">共 ' + o.items.reduce(function(s, i) { return s + i.quantity; }, 0) + ' 件，合计 <strong>' + fmt(o.totalAmount) + '</strong></div>' +
    '<div class="order-actions">' + actions + '</div></div></div>';
}

function payOrder(id) {
  var o = orders.find(function(x) { return x.id === id; });
  if (o) { o.status = 'paid'; save('milk_orders', orders); toast('支付成功！'); renderOrderList(); }
}

function cancelOrder(id) {
  var o = orders.find(function(x) { return x.id === id; });
  if (o) { o.status = 'cancelled'; save('milk_orders', orders); toast('订单已取消'); renderOrderList(); }
}

function receiveOrder(id) {
  var o = orders.find(function(x) { return x.id === id; });
  if (o) { o.status = 'done'; save('milk_orders', orders); toast('收货成功！'); renderOrderList(); }
}

function deleteOrder(id) {
  orders = orders.filter(function(x) { return x.id !== id; });
  save('milk_orders', orders);
  toast('订单已删除');
  renderOrderList();
}

function goReview(orderId) {
  var o = orders.find(function(x) { return x.id === orderId; });
  if (o) { reviewItem = o; goPage('review'); }
}

    '<div class="addr-card" style="cursor:default;margin-bottom:var(--space-4);"><div class="addr-icon">📍</div><div class="addr-info"><div class="addr-user">' +
    '<span class="addr-name">' + o.address.name + '</span><span class="addr-phone">' + fmtPhone(o.address.phone) + '</span></div>' +

    '<div class="fee-card" style="margin-bottom:var(--space-4);"><div class="fee-row"><span class="fee-label">订单编号</span><span class="fee-value" style="font-size:var(--font-size-sm)">' + o.orderNo + '</span></div>' +
    '<div class="fee-row"><span class="fee-label">下单时间</span><span class="fee-value" style="font-size:var(--font-size-sm)">' + new Date(o.createdAt).toLocaleString('zh-CN') + '</span></div>' +
    '<div class="fee-row"><span class="fee-label">商品金额</span><span class="fee-value">' + fmt(o.totalAmount - o.deliveryFee + (o.discount || 0)) + '</span></div>' +
    '<div class="fee-row"><span class="fee-label">配送费</span><span class="fee-value">' + fmt(o.deliveryFee) + '</span></div>' +
    (o.discount ? '<div class="fee-row"><span class="fee-label">优惠券</span><span class="fee-value" style="color:var(--color-error)">-' + fmt(o.discount) + '</span></div>' : '') +
    '<div class="fee-row total"><span class="fee-label">实付金额</span><span class="fee-value">' + fmt(o.totalAmount) + '</span></div></div>' +
    '<div style="display:flex;gap:var(--space-3);">' +
    (o.status === 'pending' ? '<div class="submit-btn" style="flex:1;justify-content:center;" onclick="payOrder(\'' + o.id + '\')">去付款</div>' : '') +
    (o.status === 'delivering' ? '<div class="submit-btn primary" style="flex:1;justify-content:center;" onclick="receiveOrder(\'' + o.id + '\')">确认收货</div>' : '') +

function renderUser() {
  var stats = document.querySelector('.user-stats');
  if (!stats) return;
}

function updateUserStats() {
  var pending = orders.filter(function(o) { return o.status === 'pending' || o.status === 'paid' || o.status === 'delivering'; }).length;
  var unused = coupons.filter(function(c) { return !c.used; }).length;
  $('stat-order').textContent = pending;

// ====== Address ======
function renderAddress() {
  if (!addresses.length) {
    $('addr-list').innerHTML = '<div class="empty-state"><div class="empty-icon">📍</div><div class="empty-text">暂无收货地址</div></div>';
    return;
  }
  $('addr-list').innerHTML = addresses.map(function(a) {
    return '<div class="addr-block' + (a.isDefault ? ' default' : '') + '">' +
      '<div class="addr-block-main" onclick="selectAddr(\'' + a.id + '\')">' +
      '<div class="addr-block-user">' +
      '<span class="addr-block-name">' + a.name + '</span>' +
      '<span class="addr-block-phone">' + fmtPhone(a.phone) + '</span>' +
      (a.isDefault ? '<span class="addr-tag">默认</span>' : '') + '</div>' +
      '<div class="addr-block-detail">' + a.detail + '</div></div>' +
      '<div class="addr-block-actions">' +
      '<div class="addr-action default-action' + (a.isDefault ? ' active' : '') + '" onclick="toggleDefault(\'' + a.id + '\')">' +

function selectAddr(id) {
  selectedAddr = addresses.find(function(a) { return a.id === id; }) || selectedAddr;
  save('milk_addrs', addresses);
  toast('已选择收货地址');
  goBack();
}

function toggleDefault(id) {
  addresses.forEach(function(a) { a.isDefault = a.id === id; });
  save('milk_addrs', addresses);
  renderAddress();
}

function delAddr(id) {
  addresses = addresses.filter(function(a) { return a.id !== id; });
  save('milk_addrs', addresses);
  toast('地址已删除');
  renderAddress();
}

function editAddr(id) {
  var a = addresses.find(function(x) { return x.id === id; });
  if (!a) return;
  showAddrForm(a);
}

function showAddrForm(existing) {
  var name = existing ? existing.name : '';
  var phone = existing ? existing.phone : '';
  var detail = existing ? existing.detail : '';
  var isDefault = existing ? existing.isDefault : false;

  var body = '<div class="form-field"><label class="form-label">收货人</label>' +
    '<input class="form-input" id="addr-name-input" value="' + name + '" placeholder="请输入姓名"></div>' +
    '<div class="form-field"><label class="form-label">手机号</label>' +
    '<input class="form-input" id="addr-phone-input" value="' + phone + '" placeholder="请输入手机号" type="tel"></div>' +
    '<div class="form-field"><label class="form-label">详细地址</label>' +
    '<input class="form-input" id="addr-detail-input" value="' + detail + '" placeholder="省市区、街道门牌号"></div>' +
    '<label class="checkbox-wrap" style="padding:var(--space-2) 0;"><div class="checkbox' + (isDefault ? ' checked' : '') + '" id="addr-default-check" onclick="toggleAddrDefault()">✓</div><span style="font-size:var(--font-size-sm)">设为默认地址</span></label>';

  var isNew = !existing;
  showModal(existing ? '编辑地址' : '添加地址', body, [
    { label: '取消', action: function() { closeModal(); }, primary: false },
    { label: '保存', action: function() { saveAddrForm(existing ? existing.id : null); }, primary: true }
  ]);
}

function toggleAddrDefault() {
  var check = $('addr-default-check');
  if (check) check.classList.toggle('checked');
}

function saveAddrForm(id) {
  var name = $('addr-name-input').value.trim();
  var phone = $('addr-phone-input').value.trim();
  var detail = $('addr-detail-input').value.trim();
  var isDefault = $('addr-default-check') && $('addr-default-check').classList.contains('checked');
  if (!name || !phone || !detail) { toast('请填写完整信息'); return; }
  if (!/^1[3-9]\d{9}$/.test(phone)) { toast('手机号格式不正确'); return; }

  if (id) {
    var a = addresses.find(function(x) { return x.id === id; });
    if (a) { a.name = name; a.phone = phone; a.detail = detail; a.isDefault = isDefault; }
  } else {
    addresses.push({ id: genId(), name: name, phone: phone, detail: detail, isDefault: isDefault });
  }
  if (isDefault) { addresses.forEach(function(a) { if (a.name !== name) a.isDefault = false; }); }
  save('milk_addrs', addresses);
  closeModal();
  toast('保存成功');
  renderAddress();
}

// ====== Coupon ======

      '<div class="coupon-right"><div class="coupon-name">' + c.name + '</div><div class="coupon-desc">' + c.desc + '</div>' +

}

function renderSearch() {

    '<div class="hot-tags">' + ['鲜奶', '酸奶', '纯牛奶', '有机', '安慕希', '伊利'].map(function(t) {
      return '<span class="hot-tag" onclick="doSearch(\'' + t + '\')">' + t + '</span>';
    }).join('') + '</div>';
}

function doSearch(kw) {
  kw = kw.trim();
  var result = $('search-result');
  var hot = $('search-hot');
  if (!kw) {
    result.style.display = 'none';
    hot.style.display = 'block';
    return;
  }
  hot.style.display = 'none';
  result.style.display = 'grid';
  var ps = PRODUCTS.filter(function(p) { return p.name.indexOf(kw) > -1; });
  result.innerHTML = ps.length
    ? ps.map(function(p) { return productCard(p); }).join('')
    : '<div style="grid-column:1/-1" class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">未找到 "' + kw + '" 相关商品</div></div>';
}

  var o = orders[0] || { items: [{ name: '商品', spec: '规格', emoji: '🥛' }] };
  var item = o.items[0];
  $('review-product').innerHTML = '<div class="review-product-thumb">' + item.emoji + '</div>' +
    '<div class="review-product-info"><div class="review-product-name">' + item.name + '</div><div class="review-product-spec">' + item.spec + '</div></div>';
  renderStars();
}

function renderStars() {
  $('stars').innerHTML = [1, 2, 3, 4, 5].map(function(i) {
    var active = i <= currentRating ? ' active' : '';
    return '<span class="star' + active + '" onclick="setRating(' + i + ')">★</span>';
  }).join('');
  var texts = ['', '很差', '较差', '一般', '满意', '非常满意'];
  $('rating-hint').textContent = texts[currentRating] || '';
}

function setRating(n) {
  currentRating = n;
  renderStars();
}

function onReviewInput(el) {
  $('word-count').textContent = el.value.length + ' / 500';
}

function submitReview() {
  var content = $('review-content').value.trim();
  if (!content) { toast('请输入评价内容'); return; }
  toast('评价发布成功！');
  setTimeout(function() { goBack(); }, 1200);
}

// ====== Modal ======
function showModal(title, bodyHtml, actions) {
  $('modal-title').textContent = title;
  $('modal-body').innerHTML = bodyHtml;
  $('modal-actions').innerHTML = actions.map(function(a) {
    var cls = a.primary ? 'confirm' : 'cancel';
    return '<div class="modal-btn ' + cls + '" onclick="(' + a.action.toString() + ')()">' + a.label + '</div>';
  }).join('');
  $('modal-overlay').classList.add('active');
}

function closeModal(e) {
  if (e && e.target !== $('modal-overlay')) return;
  $('modal-overlay').classList.remove('active');
}
