<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>鲜奶送到家</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2D7C5F;
      --primary-light: #4A9D7C;
      --accent: #E8A849;
      --bg: #F7F9FA;
      --surface: #FFFFFF;
      --text: #1A1A1A;
      --text-secondary: #6B7280;
      --text-tertiary: #9CA3AF;
      --border: #E5E7EB;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.1);
      --radius: 12px;
      --radius-sm: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; max-width: 430px; margin: 0 auto; min-height: 100vh; overflow-x: hidden; }

    .page { display: none; min-height: 100vh; padding-bottom: 70px; }
    .page.active { display: block; }

    /* 搜索栏 */
    .search-header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); padding: 12px 16px 50px; }
    .search-box { background: white; border-radius: 24px; padding: 10px 16px; display: flex; align-items: center; gap: 8px; }
    .search-box input { flex: 1; border: none; outline: none; font-size: 14px; }
    .search-icon { color: var(--text-tertiary); }

    /* 横幅 */
    .banner { background: white; margin: -40px 16px 16px; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 12px; }
    .banner-emoji { font-size: 40px; }
    .banner-text { flex: 1; }
    .banner-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .banner-desc { font-size: 12px; color: var(--text-secondary); }
    .banner-btn { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 16px; font-size: 12px; cursor: pointer; }

    /* 分类 */
    .section { padding: 16px; }
    .section-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
    .categories { display: flex; gap: 12px; overflow-x: auto; padding: 0 16px; margin-bottom: 16px; -webkit-overflow-scrolling: touch; }
    .categories::-webkit-scrollbar { display: none; }
    .category-item { flex-shrink: 0; text-align: center; cursor: pointer; }
    .category-icon { width: 52px; height: 52px; background: var(--surface); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; margin-bottom: 6px; box-shadow: var(--shadow); }
    .category-item.active .category-icon { background: var(--primary); }
    .category-name { font-size: 11px; color: var(--text-secondary); }
    .category-item.active .category-name { color: var(--primary); font-weight: 500; }

    /* 商品网格 */
    .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 16px; }
    .product-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .product-card:active { transform: scale(0.98); }
    .product-img { height: 120px; background: linear-gradient(180deg, #E8F5E9 0%, #C8E6C9 100%); display: flex; align-items: center; justify-content: center; position: relative; }
    .product-emoji { font-size: 48px; }
    .product-tag { position: absolute; top: 8px; left: 8px; background: var(--accent); color: white; font-size: 10px; padding: 3px 8px; border-radius: 4px; }
    .product-info { padding: 10px; }
    .product-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .product-spec { font-size: 11px; color: var(--text-tertiary); margin-bottom: 8px; }
    .product-bottom { display: flex; justify-content: space-between; align-items: center; }
    .product-price { color: var(--danger); font-size: 15px; font-weight: 700; }
    .add-btn { width: 26px; height: 26px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; border: none; }

    /* TabBar */
    .tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); max-width: 430px; width: 100%; background: var(--surface); display: flex; padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); z-index: 100; }
    .tab-item { flex: 1; text-align: center; cursor: pointer; }
    .tab-icon { font-size: 20px; display: block; margin-bottom: 2px; }
    .tab-text { font-size: 10px; color: var(--text-tertiary); }
    .tab-item.active .tab-text { color: var(--primary); font-weight: 500; }

    /* 购物车 */
    .cart-header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color: white; padding: 16px; font-size: 16px; font-weight: 700; }
    .cart-list { padding: 16px; }
    .cart-item { background: var(--surface); border-radius: var(--radius); padding: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow); }
    .cart-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); }
    .cart-img { width: 70px; height: 70px; background: linear-gradient(180deg, #E8F5E9 0%, #C8E6C9 100%); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
    .cart-info { flex: 1; min-width: 0; }
    .cart-name { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cart-spec { font-size: 11px; color: var(--text-tertiary); margin: 4px 0 8px; }
    .cart-bottom { display: flex; justify-content: space-between; align-items: center; }
    .cart-price { color: var(--danger); font-size: 14px; font-weight: 700; }
    .qty-control { display: flex; align-items: center; gap: 8px; }
    .qty-btn { width: 24px; height: 24px; background: var(--bg); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; border: none; }
    .qty-num { width: 24px; text-align: center; font-size: 13px; font-weight: 500; }
    .cart-empty { text-align: center; padding: 60px 0; }
    .cart-empty-emoji { font-size: 56px; display: block; margin-bottom: 12px; }
    .cart-empty-text { color: var(--text-tertiary); font-size: 14px; margin-bottom: 16px; }
    .cart-empty-btn { background: var(--primary); color: white; border: none; padding: 12px 32px; border-radius: 24px; font-size: 14px; cursor: pointer; }
    .cart-footer { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); max-width: 430px; width: 100%; background: var(--surface); padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-top: 1px solid var(--border); }
    .cart-select-all { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .cart-total { flex: 1; text-align: right; }
    .cart-total-price { color: var(--danger); font-size: 16px; font-weight: 700; }
    .checkout-btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 24px; font-size: 14px; font-weight: 600; cursor: pointer; }

    /* 订单列表 */
    .order-header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color: white; padding: 16px; font-size: 16px; font-weight: 700; }
    .order-tabs { display: flex; background: var(--surface); }
    .order-tab { flex: 1; text-align: center; padding: 14px 0; font-size: 13px; color: var(--text-secondary); position: relative; cursor: pointer; }
    .order-tab.active { color: var(--primary); font-weight: 600; }
    .order-tab.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 20px; height: 3px; background: var(--primary); border-radius: 2px; }
    .order-list { padding: 16px; }
    .order-card { background: var(--surface); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; box-shadow: var(--shadow); }
    .order-top { padding: 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .order-no { font-size: 11px; color: var(--text-tertiary); }
    .order-status { font-size: 12px; font-weight: 600; }
    .order-status.pending { color: var(--warning); }
    .order-status.paid { color: var(--primary); }
    .order-status.completed { color: var(--success); }
    .order-items { padding: 12px; }
    .order-item { display: flex; gap: 10px; margin-bottom: 10px; }
    .order-item:last-child { margin-bottom: 0; }
    .order-img { width: 50px; height: 50px; background: linear-gradient(180deg, #E8F5E9 0%, #C8E6C9 100%); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .order-info { flex: 1; }
    .order-name { font-size: 12px; font-weight: 500; }
    .order-spec { font-size: 10px; color: var(--text-tertiary); }
    .order-right { text-align: right; }
    .order-price { font-size: 12px; font-weight: 600; }
    .order-qty { font-size: 10px; color: var(--text-tertiary); }
    .order-footer { padding: 12px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
    .order-btn { padding: 6px 14px; border-radius: 16px; font-size: 11px; cursor: pointer; border: 1px solid var(--border); background: white; color: var(--text-secondary); }
    .order-btn.primary { background: var(--primary); color: white; border: none; }
    .order-empty { text-align: center; padding: 60px 0; }
    .order-empty-emoji { font-size: 56px; display: block; margin-bottom: 12px; }
    .order-empty-text { color: var(--text-tertiary); font-size: 14px; }

    /* 个人中心 */
    .user-header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); padding: 24px 16px; color: white; display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 56px; height: 56px; background: rgba(255,255,255,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .user-name { font-size: 17px; font-weight: 700; }
    .user-level { font-size: 11px; background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 10px; margin-top: 6px; display: inline-block; }
    .user-stats { display: flex; background: var(--surface); margin: -16px 16px 16px; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow-lg); }
    .user-stat { flex: 1; text-align: center; cursor: pointer; }
    .user-stat-num { font-size: 18px; font-weight: 700; }
    .user-stat-label { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }
    .menu-section { margin: 0 16px; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .menu-item { padding: 14px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
    .menu-item:last-child { border-bottom: none; }
    .menu-icon { font-size: 18px; }
    .menu-text { flex: 1; font-size: 14px; }
    .menu-arrow { color: var(--text-tertiary); font-size: 16px; }

    /* 确认订单 */
    .confirm-header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color: white; padding: 16px; font-size: 16px; font-weight: 700; }
    .addr-card { background: var(--surface); margin: -12px 16px 12px; border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow-lg); cursor: pointer; }
    .addr-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .addr-name { font-size: 14px; font-weight: 600; }
    .addr-phone { font-size: 13px; color: var(--text-secondary); margin-left: 8px; }
    .addr-detail { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
    .goods-section { background: var(--surface); margin: 0 16px 12px; border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); }
    .goods-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .goods-item { display: flex; gap: 10px; margin-bottom: 10px; }
    .goods-img { width: 56px; height: 56px; background: linear-gradient(180deg, #E8F5E9 0%, #C8E6C9 100%); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .goods-info { flex: 1; }
    .goods-name { font-size: 12px; font-weight: 500; }
    .goods-spec { font-size: 10px; color: var(--text-tertiary); }
    .goods-right { text-align: right; }
    .goods-price { font-size: 13px; font-weight: 600; }
    .goods-qty { font-size: 10px; color: var(--text-tertiary); }
    .fee-section { background: var(--surface); margin: 0 16px 12px; border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); }
    .fee-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
    .fee-row:last-child { margin-bottom: 0; }
    .fee-row.total { padding-top: 12px; border-top: 1px solid var(--border); font-size: 15px; font-weight: 600; }
    .confirm-footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); max-width: 430px; width: 100%; background: var(--surface); padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-top: 1px solid var(--border); }
    .confirm-total { flex: 1; }
    .confirm-total-price { color: var(--danger); font-size: 18px; font-weight: 700; }
    .submit-btn { background: var(--primary); color: white; border: none; padding: 14px 28px; border-radius: 24px; font-size: 14px; font-weight: 600; cursor: pointer; }

    /* 搜索页 */
    .page-header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
    .page-back { font-size: 18px; cursor: pointer; color: white; }
    .search-input-wrap { flex: 1; background: rgba(255,255,255,0.2); border-radius: 20px; padding: 8px 14px; display: flex; align-items: center; gap: 8px; }
    .search-input-wrap input { flex: 1; background: transparent; border: none; outline: none; color: white; font-size: 14px; }
    .search-input-wrap input::placeholder { color: rgba(255,255,255,0.7); }
    .hot-search { padding: 16px; }
    .hot-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .hot-tags { display: flex; flex-wrap: wrap; gap: 10px; }
    .hot-tag { background: var(--surface); padding: 8px 16px; border-radius: 18px; font-size: 12px; cursor: pointer; box-shadow: var(--shadow); }

    /* 地址页 */
    .addr-list { padding: 16px; }
    .addr-card-item { background: var(--surface); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow); }
    .addr-card-item.default { border: 2px solid var(--primary); }
    .addr-card-user { display: flex; gap: 10px; margin-bottom: 6px; }
    .addr-card-name { font-size: 14px; font-weight: 600; }
    .addr-card-phone { font-size: 13px; color: var(--text-secondary); }
    .addr-card-detail { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
    .add-addr-btn { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); max-width: 430px; width: calc(100% - 32px); background: var(--primary); color: white; text-align: center; padding: 14px; border-radius: 24px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; }

    /* 优惠券 */
    .coupon-list { padding: 16px; }
    .coupon-item { display: flex; background: var(--surface); border-radius: var(--radius); overflow: hidden; margin-bottom: 10px; box-shadow: var(--shadow); }
    .coupon-left { width: 80px; background: linear-gradient(135deg, var(--danger), #ff6b6b); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; padding: 16px 0; }
    .coupon-val { font-size: 24px; font-weight: 700; }
    .coupon-unit { font-size: 10px; }
    .coupon-right { flex: 1; padding: 12px; }
    .coupon-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .coupon-desc { font-size: 11px; color: var(--text-tertiary); }
    .coupon-time { font-size: 10px; color: var(--text-tertiary); margin-top: 4px; }
    .coupon-action { width: 70px; display: flex; align-items: center; justify-content: center; background: var(--danger); color: white; font-size: 12px; border: none; cursor: pointer; }

    /* Toast */
    .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 8px; font-size: 13px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- 首页 -->
<div id="page-home" class="page active">
  <div class="search-header">
    <div style="color: white; font-size: 20px; font-weight: 700; margin-bottom: 4px;">鲜奶送到家</div>
    <div style="color: rgba(255,255,255,0.8); font-size: 12px; margin-bottom: 12px;">新鲜牛奶，每日直达</div>
    <div class="search-box" onclick="goPage('search')">
      <span class="search-icon">🔍</span>
      <input placeholder="搜索牛奶商品" readonly>
    </div>
  </div>

  <div class="banner">
    <span class="banner-emoji">🥛</span>
    <div class="banner-text">
      <div class="banner-title">新人专享</div>
      <div class="banner-desc">首单满39减10元</div>
    </div>
    <button class="banner-btn" onclick="showToast('优惠券已领取')">立即领取</button>
  </div>

  <div class="section">
    <div class="section-title">热门分类</div>
  </div>
  <div class="categories" id="home-categories"></div>

  <div class="section">
    <div class="section-title">精选商品</div>
  </div>
  <div class="products-grid" id="home-products"></div>

  <div class="tab-bar" id="tab-bar-home"></div>
</div>

<!-- 分类页 -->
<div id="page-category" class="page">
  <div class="page-header">
    <span class="page-back" onclick="goPage('home')">←</span>
    <span style="color: white; font-size: 16px; font-weight: 600;">全部分类</span>
  </div>
  <div class="categories" id="cat-categories" style="padding: 16px; flex-wrap: wrap; justify-content: flex-start;"></div>
  <div class="section">
    <div class="section-title" id="cat-title">热门商品</div>
  </div>
  <div class="products-grid" id="cat-products"></div>
  <div class="tab-bar" id="tab-bar-category"></div>
</div>

<!-- 购物车 -->
<div id="page-cart" class="page">
  <div class="cart-header">购物车 <span id="cart-count" style="font-size: 13px; font-weight: 400; opacity: 0.8;"></span></div>
  <div class="cart-list" id="cart-content"></div>
  <div class="cart-footer" id="cart-footer" style="display: none;">
    <label class="cart-select-all">
      <input type="checkbox" id="select-all" onchange="toggleSelectAll(this.checked)"> 全选
    </label>
    <div class="cart-total">合计: <span class="cart-total-price" id="cart-total">¥0</span></div>
    <button class="checkout-btn" onclick="checkout()">结算</button>
  </div>
  <div class="tab-bar" id="tab-bar-cart"></div>
</div>

<!-- 订单列表 -->
<div id="page-orders" class="page">
  <div class="order-header">我的订单</div>
  <div class="order-tabs" id="order-tabs"></div>
  <div class="order-list" id="order-content"></div>
  <div class="tab-bar" id="tab-bar-orders"></div>
</div>

<!-- 个人中心 -->
<div id="page-user" class="page">
  <div class="user-header">
    <div class="user-avatar">👤</div>
    <div>
      <div class="user-name">牛奶用户</div>
      <div class="user-level">银卡会员</div>
    </div>
  </div>
  <div class="user-stats">
    <div class="user-stat" onclick="goPage('orders'); filterOrder('pending')">
      <div class="user-stat-num" id="stat-pending">0</div>
      <div class="user-stat-label">待支付</div>
    </div>
    <div class="user-stat" onclick="goPage('orders'); filterOrder('paid')">
      <div class="user-stat-num" id="stat-paid">0</div>
      <div class="user-stat-label">待配送</div>
    </div>
    <div class="user-stat" onclick="goPage('orders')">
      <div class="user-stat-num" id="stat-completed">0</div>
      <div class="user-stat-label">已完成</div>
    </div>
    <div class="user-stat" onclick="goPage('coupon')">
      <div class="user-stat-num">3</div>
      <div class="user-stat-label">优惠券</div>
    </div>
  </div>
  <div class="menu-section">
    <div class="menu-item" onclick="goPage('address')">
      <span class="menu-icon">📍</span>
      <span class="menu-text">收货地址</span>
      <span class="menu-arrow">›</span>
    </div>
    <div class="menu-item" onclick="goPage('orders')">
      <span class="menu-icon">📋</span>
      <span class="menu-text">我的订单</span>
      <span class="menu-arrow">›</span>
    </div>
    <div class="menu-item" onclick="goPage('coupon')">
      <span class="menu-icon">🎫</span>
      <span class="menu-text">优惠券</span>
      <span class="menu-arrow">›</span>
    </div>
    <div class="menu-item" onclick="showToast('客服热线: 400-888-8888')">
      <span class="menu-icon">📞</span>
      <span class="menu-text">联系客服</span>
      <span class="menu-arrow">›</span>
    </div>
  </div>
  <div class="tab-bar" id="tab-bar-user"></div>
</div>

<!-- 确认订单 -->
<div id="page-confirm" class="page">
  <div class="confirm-header">确认订单</div>
  <div class="addr-card" onclick="showToast('选择地址')">
    <div class="addr-card-header">
      <span>📍</span>
      <span class="addr-name">张三</span>
      <span class="addr-phone">138****8888</span>
    </div>
    <div class="addr-card-detail">北京市朝阳区建国路88号SOHO现代城A座</div>
  </div>
  <div class="goods-section">
    <div class="goods-title">商品清单</div>
    <div id="confirm-goods"></div>
  </div>
  <div class="fee-section">
    <div class="fee-row">
      <span>商品金额</span>
      <span id="fee-goods">¥0</span>
    </div>
    <div class="fee-row">
      <span>配送费</span>
      <span>¥5</span>
    </div>
    <div class="fee-row total">
      <span>实付款</span>
      <span id="fee-total">¥0</span>
    </div>
  </div>
  <div class="confirm-footer">
    <div class="confirm-total">合计: <span class="confirm-total-price" id="confirm-price">¥0</span></div>
    <button class="submit-btn" onclick="submitOrder()">提交订单</button>
  </div>
</div>

<!-- 搜索页 -->
<div id="page-search" class="page">
  <div class="page-header">
    <span class="page-back" onclick="goBack()">←</span>
    <div class="search-input-wrap">
      <span>🔍</span>
      <input id="search-input" placeholder="搜索商品" oninput="doSearch(this.value)">
    </div>
  </div>
  <div id="search-hot" class="hot-search">
    <div class="hot-title">热门搜索</div>
    <div class="hot-tags">
      <span class="hot-tag" onclick="doSearch('鲜奶')">鲜奶</span>
      <span class="hot-tag" onclick="doSearch('酸奶')">酸奶</span>
      <span class="hot-tag" onclick="doSearch('有机')">有机牛奶</span>
      <span class="hot-tag" onclick="doSearch('安慕希')">安慕希</span>
    </div>
  </div>
  <div class="products-grid" id="search-results" style="display: none;"></div>
  <div class="tab-bar" id="tab-bar-search"></div>
</div>

<!-- 地址页 -->
<div id="page-address" class="page">
  <div class="page-header">
    <span class="page-back" onclick="goBack()">←</span>
    <span style="color: white; font-size: 16px; font-weight: 600;">收货地址</span>
  </div>
  <div class="addr-list" id="addr-list"></div>
  <button class="add-addr-btn" onclick="showToast('添加地址功能开发中')">+ 添加收货地址</button>
  <div class="tab-bar" id="tab-bar-address"></div>
</div>

<!-- 优惠券 -->
<div id="page-coupon" class="page">
  <div class="page-header">
    <span class="page-back" onclick="goBack()">←</span>
    <span style="color: white; font-size: 16px; font-weight: 600;">优惠券</span>
  </div>
  <div class="coupon-list" id="coupon-list"></div>
  <div class="tab-bar" id="tab-bar-coupon"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// 数据
const CATEGORIES = [
  { id: 'all', name: '全部', emoji: '🏠' },
  { id: 'fresh', name: '鲜奶', emoji: '🥛' },
  { id: 'yogurt', name: '酸奶', emoji: '🍶' },
  { id: 'milk', name: '纯牛奶', emoji: '🥛' },
  { id: 'cheese', name: '奶酪', emoji: '🧀' },
  { id: 'organic', name: '有机奶', emoji: '🌿' },
  { id: 'drink', name: '乳酸菌', emoji: '🧃' }
];

const PRODUCTS = [
  { id: '1', name: '每日鲜语鲜牛奶', spec: '1L/瓶', price: 19.9, category: 'fresh', emoji: '🥛', tag: '新品' },
  { id: '2', name: '安慕希酸奶', spec: '205g/盒', price: 12.9, category: 'yogurt', emoji: '🍶', tag: '热销' },
  { id: '3', name: '伊利纯牛奶', spec: '250ml/盒', price: 3.5, category: 'milk', emoji: '🥛', tag: '' },
  { id: '4', name: '莫斯利安酸奶', spec: '200g/盒', price: 8.9, category: 'yogurt', emoji: '🍶', tag: '' },
  { id: '5', name: '特仑苏有机奶', spec: '250ml/盒', price: 6.5, category: 'organic', emoji: '🌿', tag: '有机' },
  { id: '6', name: '光明如实酸奶', spec: '180g/杯', price: 9.9, category: 'yogurt', emoji: '🍶', tag: '无糖' },
  { id: '7', name: '安佳奶酪棒', spec: '100g/盒', price: 22.0, category: 'cheese', emoji: '🧀', tag: '' },
  { id: '8', name: '味全乳酸菌', spec: '435ml/瓶', price: 6.9, category: 'drink', emoji: '🧃', tag: '' },
  { id: '9', name: '蒙牛现代牧业', spec: '1L/盒', price: 15.0, category: 'fresh', emoji: '🥛', tag: '' },
  { id: '10', name: '德亚有机牛奶', spec: '1L/盒', price: 18.0, category: 'organic', emoji: '🌿', tag: '进口' }
];

const COUPONS = [
  { id: 1, value: 10, name: '新人专享券', desc: '满59元可用', expire: '2026-04-30' },
  { id: 2, value: 20, name: '满减优惠券', desc: '满129元可用', expire: '2026-05-15' },
  { id: 3, value: 5, name: '配送费券', desc: '无门槛', expire: '2026-04-25' }
];

// 状态
let cart = JSON.parse(localStorage.getItem('milk_cart') || '[]');
let orders = JSON.parse(localStorage.getItem('milk_orders') || '[]');
let currentCat = 'all';
let currentOrderFilter = 'all';
let prevPage = 'home';

// 工具函数
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function fmtPrice(p) { return '¥' + p.toFixed(1); }

function save(key, val) {
  localStorage.setItem(key, JSON.stringify(val));
}

// 页面导航
function goPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  prevPage = page;
  renderTabBar(page);
  
  if (page === 'home') renderHome();
  else if (page === 'category') renderCategory();
  else if (page === 'cart') renderCart();
  else if (page === 'orders') renderOrders();
  else if (page === 'user') renderUser();
  else if (page === 'confirm') renderConfirm();
  else if (page === 'search') renderSearch();
  else if (page === 'address') renderAddress();
  else if (page === 'coupon') renderCoupon();
}

function goBack() { goPage(prevPage || 'home'); }

// TabBar
function renderTabBar(active) {
  const tabs = [
    { key: 'home', icon: '🏠', text: '首页' },
    { key: 'category', icon: '📋', text: '分类' },
    { key: 'cart', icon: '🛒', text: '购物车' },
    { key: 'orders', icon: '📦', text: '订单' },
    { key: 'user', icon: '👤', text: '我的' }
  ];
  const html = tabs.map(t => 
    '<div class="tab-item' + (t.key === active ? ' active' : '') + '" onclick="goPage(\'' + t.key + '\')">' +
    '<span class="tab-icon">' + t.icon + '</span>' +
    '<span class="tab-text">' + t.text + '</span></div>'
  ).join('');
  document.querySelectorAll('.tab-bar').forEach(el => el.innerHTML = html);
}

// 首页
function renderHome() {
  const html = CATEGORIES.map(c => 
    '<div class="category-item' + (c.id === currentCat ? ' active' : '') + '" onclick="setCategory(\'' + c.id + '\')">' +
    '<div class="category-icon">' + c.emoji + '</div>' +
    '<div class="category-name">' + c.name + '</div></div>'
  ).join('');
  document.getElementById('home-categories').innerHTML = html;
  renderProducts('home-products');
}

function setCategory(id) {
  currentCat = id;
  renderHome();
}

function renderProducts(containerId) {
  let prods = PRODUCTS;
  if (currentCat !== 'all') {
    prods = prods.filter(p => p.category === currentCat);
  }
  const html = prods.map(p => 
    '<div class="product-card" onclick="addToCart(\'' + p.id + '\')">' +
    '<div class="product-img">' +
    '<span class="product-emoji">' + p.emoji + '</span>' +
    (p.tag ? '<span class="product-tag">' + p.tag + '</span>' : '') +
    '</div>' +
    '<div class="product-info">' +
    '<div class="product-name">' + p.name + '</div>' +
    '<div class="product-spec">' + p.spec + '</div>' +
    '<div class="product-bottom">' +
    '<span class="product-price">' + fmtPrice(p.price) + '</span>' +
    '<button class="add-btn" onclick="event.stopPropagation(); addToCart(\'' + p.id + '\')">+</button>' +
    '</div></div></div>'
  ).join('');
  document.getElementById(containerId).innerHTML = html;
}

// 分类页
function renderCategory() {
  const html = CATEGORIES.map(c => 
    '<div class="category-item' + (c.id === currentCat ? ' active' : '') + '" onclick="setCategory2(\'' + c.id + '\')">' +
    '<div class="category-icon">' + c.emoji + '</div>' +
    '<div class="category-name">' + c.name + '</div></div>'
  ).join('');
  document.getElementById('cat-categories').innerHTML = html;
  const cat = CATEGORIES.find(c => c.id === currentCat);
  document.getElementById('cat-title').textContent = cat ? cat.name + '商品' : '商品';
  renderProducts('cat-products');
}

function setCategory2(id) {
  currentCat = id;
  renderCategory();
}

// 购物车
function addToCart(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  const exist = cart.find(x => x.id === id);
  if (exist) {
    exist.quantity++;
  } else {
    cart.push({ id: p.id, name: p.name, spec: p.spec, price: p.price, emoji: p.emoji, quantity: 1, selected: true });
  }
  save('milk_cart', cart);
  showToast('已加入购物车');
}

function renderCart() {
  const total = cart.filter(i => i.selected).reduce((s, i) => s + i.price * i.quantity, 0);
  document.getElementById('cart-count').textContent = cart.length ? '( ' + cart.reduce((s, i) => s + i.quantity, 0) + ' 件)' : '';
  document.getElementById('cart-total').textContent = fmtPrice(total);
  document.getElementById('cart-footer').style.display = cart.length ? 'flex' : 'none';
  
  const content = document.getElementById('cart-content');
  if (!cart.length) {
    content.innerHTML = '<div class="cart-empty"><div class="cart-empty-emoji">🛒</div><div class="cart-empty-text">购物车是空的</div><button class="cart-empty-btn" onclick="goPage(\'home\')">去逛逛</button></div>';
    return;
  }
  
  content.innerHTML = cart.map((item, idx) => 
    '<div class="cart-item">' +
    '<input type="checkbox" ' + (item.selected ? 'checked' : '') + ' onchange="toggleCartItem(' + idx + ', this.checked)">' +
    '<div class="cart-img">' + item.emoji + '</div>' +
    '<div class="cart-info">' +
    '<div class="cart-name">' + item.name + '</div>' +
    '<div class="cart-spec">' + item.spec + '</div>' +
    '<div class="cart-bottom">' +
    '<span class="cart-price">' + fmtPrice(item.price) + '</span>' +
    '<div class="qty-control">' +
    '<button class="qty-btn" onclick="changeQty(' + idx + ', -1)">-</button>' +
    '<span class="qty-num">' + item.quantity + '</span>' +
    '<button class="qty-btn" onclick="changeQty(' + idx + ', 1)">+</button>' +
    '</div></div></div></div>'
  ).join('');
}

function toggleCartItem(idx, checked) {
  cart[idx].selected = checked;
  save('milk_cart', cart);
  renderCart();
}

function toggleSelectAll(checked) {
  cart.forEach(i => i.selected = checked);
  save('milk_cart', cart);
  renderCart();
}

function changeQty(idx, delta) {
  cart[idx].quantity += delta;
  if (cart[idx].quantity < 1) cart[idx].quantity = 1;
  save('milk_cart', cart);
  renderCart();
}

function checkout() {
  if (!cart.some(i => i.selected)) {
    showToast('请选择商品');
    return;
  }
  goPage('confirm');
}

// 确认订单
function renderConfirm() {
  const selItems = cart.filter(i => i.selected);
  document.getElementById('confirm-goods').innerHTML = selItems.map(i => 
    '<div class="goods-item">' +
    '<div class="goods-img">' + i.emoji + '</div>' +
    '<div class="goods-info">' +
    '<div class="goods-name">' + i.name + '</div>' +
    '<div class="goods-spec">' + i.spec + '</div>' +
    '</div>' +
    '<div class="goods-right">' +
    '<div class="goods-price">' + fmtPrice(i.price) + '</div>' +
    '<div class="goods-qty">x' + i.quantity + '</div>' +
    '</div></div>'
  ).join('');
  
  const goodsAmt = selItems.reduce((s, i) => s + i.price * i.quantity, 0);
  const total = goodsAmt + 5;
  document.getElementById('fee-goods').textContent = fmtPrice(goodsAmt);
  document.getElementById('fee-total').textContent = fmtPrice(total);
  document.getElementById('confirm-price').textContent = fmtPrice(total);
}

function submitOrder() {
  const selItems = cart.filter(i => i.selected);
  if (!selItems.length) return;
  
  const order = {
    id: Date.now(),
    no: 'MD' + new Date().toISOString().slice(0,10).replace(/-/g,'') + Math.floor(Math.random()*1000).toString().padStart(3,'0'),
    status: 'paid',
    items: selItems,
    total: selItems.reduce((s, i) => s + i.price * i.quantity, 0) + 5,
    time: new Date().toISOString()
  };
  orders.unshift(order);
  save('milk_orders', orders);
  cart = cart.filter(i => !i.selected);
  save('milk_cart', cart);
  showToast('订单提交成功');
  goPage('orders');
}

// 订单列表
function renderOrders() {
  const tabs = ['all', 'pending', 'paid', 'completed'];
  const tabHtml = tabs.map(s => 
    '<div class="order-tab' + (currentOrderFilter === s ? ' active' : '') + '" onclick="filterOrder(\'' + s + '\')">' +
    (s === 'all' ? '全部' : s === 'pending' ? '待支付' : s === 'paid' ? '待配送' : '已完成') + '</div>'
  ).join('');
  document.getElementById('order-tabs').innerHTML = tabHtml;
  
  // 更新统计
  document.getElementById('stat-pending').textContent = orders.filter(o => o.status === 'pending').length;
  document.getElementById('stat-paid').textContent = orders.filter(o => o.status === 'paid' || o.status === 'delivering').length;
  document.getElementById('stat-completed').textContent = orders.filter(o => o.status === 'completed').length;
  
  let filtered = currentOrderFilter === 'all' ? orders : orders.filter(o => o.status === currentOrderFilter);
  const content = document.getElementById('order-content');
  
  if (!filtered.length) {
    content.innerHTML = '<div class="order-empty"><div class="order-empty-emoji">📦</div><div class="order-empty-text">暂无订单</div></div>';
    return;
  }
  
  content.innerHTML = filtered.map(o => 
    '<div class="order-card">' +
    '<div class="order-top">' +
    '<span class="order-no">' + o.no + '</span>' +
    '<span class="order-status ' + o.status + '">' + 
    (o.status === 'pending' ? '待支付' : o.status === 'paid' ? '待配送' : o.status === 'delivering' ? '配送中' : '已完成') + 
    '</span></div>' +
    '<div class="order-items">' +
    o.items.slice(0, 2).map(i => 
      '<div class="order-item"><div class="order-img">' + i.emoji + '</div>' +
      '<div class="order-info"><div class="order-name">' + i.name + '</div><div class="order-spec">' + i.spec + '</div></div>' +
      '<div class="order-right"><div class="order-price">' + fmtPrice(i.price) + '</div><div class="order-qty">x' + i.quantity + '</div></div></div>'
    ).join('') +
    (o.items.length > 2 ? '<div style="font-size:11px;color:var(--text-tertiary);">还有 ' + (o.items.length - 2) + ' 件商品</div>' : '') +
    '</div>' +
    '<div class="order-footer">' +
    '<button class="order-btn" onclick="showToast(\'查看物流\')">查看物流</button>' +
    '<button class="order-btn primary" onclick="showToast(\'再次购买\')">再次购买</button>' +
    '</div></div>'
  ).join('');
}

function filterOrder(status) {
  currentOrderFilter = status;
  renderOrders();
}

// 用户中心
function renderUser() {
  renderOrders();
}

// 搜索
function renderSearch() {
  document.getElementById('search-hot').style.display = 'block';
  document.getElementById('search-results').style.display = 'none';
}

function doSearch(kw) {
  const hot = document.getElementById('search-hot');
  const results = document.getElementById('search-results');
  
  if (!kw) {
    hot.style.display = 'block';
    results.style.display = 'none';
    return;
  }
  
  hot.style.display = 'none';
  results.style.display = 'grid';
  
  const prods = PRODUCTS.filter(p => p.name.includes(kw));
  if (!prods.length) {
    results.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-tertiary);">未找到商品</div>';
  } else {
    results.innerHTML = prods.map(p => 
      '<div class="product-card" onclick="addToCart(\'' + p.id + '\')">' +
      '<div class="product-img"><span class="product-emoji">' + p.emoji + '</span></div>' +
      '<div class="product-info">' +
      '<div class="product-name">' + p.name + '</div>' +
      '<div class="product-spec">' + p.spec + '</div>' +
      '<div class="product-bottom">' +
      '<span class="product-price">' + fmtPrice(p.price) + '</span>' +
      '<button class="add-btn" onclick="event.stopPropagation(); addToCart(\'' + p.id + '\')">+</button>' +
      '</div></div></div>'
    ).join('');
  }
}

// 地址
function renderAddress() {
  const list = document.getElementById('addr-list');
  list.innerHTML = 
    '<div class="addr-card-item default">' +
    '<div class="addr-card-user"><span class="addr-card-name">张三</span><span class="addr-card-phone">138****8888</span></div>' +
    '<div class="addr-card-detail">北京市朝阳区建国路88号SOHO现代城A座</div></div>' +
    '<div class="addr-card-item">' +
    '<div class="addr-card-user"><span class="addr-card-name">李四</span><span class="addr-card-phone">139****6666</span></div>' +
    '<div class="addr-card-detail">上海市浦东新区世纪大道100号</div></div>';
}

// 优惠券
function renderCoupon() {
  const list = document.getElementById('coupon-list');
  list.innerHTML = COUPONS.map(c => 
    '<div class="coupon-item">' +
    '<div class="coupon-left"><div class="coupon-val">' + c.value + '</div><div class="coupon-unit">元</div></div>' +
    '<div class="coupon-right"><div class="coupon-name">' + c.name + '</div><div class="coupon-desc">' + c.desc + '</div><div class="coupon-time">有效期至 ' + c.expire + '</div></div>' +
    '<button class="coupon-action" onclick="showToast(\'领取成功\')">领取</button></div>'
  ).join('');
}

// 初始化
document.addEventListener('DOMContentLoaded', function() {
  // 模拟订单数据
  if (!orders.length) {
    orders = [{
      id: 1,
      no: 'MD20260417001',
      status: 'paid',
      items: [{ id: '1', name: '每日鲜语鲜牛奶', spec: '1L/瓶', price: 19.9, quantity: 2, emoji: '🥛' }],
      total: 44.8,
      time: new Date().toISOString()
    }];
    save('milk_orders', orders);
  }
  goPage('home');
});
</script>
</body>
</html>
